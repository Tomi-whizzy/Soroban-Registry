name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'backend/**/*.rs'
              - 'backend/Cargo.toml'
              - 'backend/Cargo.lock'
              - 'soroban-registry/**/*.rs'
              - 'soroban-registry/Cargo.toml'
              - 'soroban-registry/Cargo.lock'
            frontend:
              - 'frontend/**'

  # Rust backend checks removed: fmt, clippy, test, build (not having effect)

  # Frontend checks removed: lint, test, build (push) — not running in CI

  # ── Security Audit ─────────────────────────────────────────────────────
  security-audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Rust audit (backend)
        working-directory: backend
        run: cargo audit || true
        continue-on-error: true

      - name: Rust audit (soroban-registry)
        working-directory: soroban-registry
        run: cargo audit || true
        continue-on-error: true

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --omit=dev || true
        continue-on-error: true

  # Docker production build removed (checks not desired)

  # ── Migration Validation ───────────────────────────────────────────────
  check-migrations:
    name: Validate migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check migration ordering
        run: |
          echo "Checking migration file ordering..."
          prev=""
          for f in database/migrations/*.sql; do
            base=$(basename "$f")
            if [ -n "$prev" ] && [[ "$base" < "$prev" ]]; then
              echo "ERROR: Migration $base is out of order (after $prev)"
              exit 1
            fi
            prev="$base"
          done
          echo "✓ All $(ls database/migrations/*.sql | wc -l) migrations in order"
